<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bodrum Tour</title>
  <script>
    // GitHub Pages SPA redirect — encodes the path into a query string
    // so index.html can restore it via history.replaceState.
    // segmentCount = 1 matches the /bodrum-tour/ base path.
    var segmentCount = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
